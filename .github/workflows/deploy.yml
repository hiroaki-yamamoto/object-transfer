name: Publish to crates.io

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: "Install Cargo edit"
        run: cargo install cargo-edit

      - name: Verify version in Cargo.toml matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG_VERSION#v}
          cargo set-version $TAG_VERSION
      - name: Commit version update
        run: |
          git config user.name "Hiroaki Yamamoto (Bot)"
          git config user.email "5356011+hiroaki-yamamoto@users.noreply.github.com"
          git add .
          git commit -m "Update version to $TAG_VERSION for release"
        working-directory: .

      - name: Check if version already published
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          if cargo search object_transfer --limit 1 | grep "object_transfer = \"$VERSION\""; then
            echo "Version $VERSION is already published to crates.io"
            exit 1
          fi

      - name: Publish to crates.io
        run: |
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
  gh-release:
    name: Create Github Release
    runs-on: ubuntu-latest
    needs: publish-crates
    steps:
      - uses: actions/checkout@v6
      - name: Create Github Release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo hiroaki-yamamoto/object-transfer \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
